# playbook for ubuntu
- name: ubuntu config
  hosts: ubuntu
  tasks:
    - name: create the .ssh directory if its not there
      file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        mode: 0700

    - name: create authorized_keys file
      file:
        path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
        state: touch
        mode: 0644

    - name: copy over key block and append to authorized_keys
      blockinfile:
        dest: "/home/{{ ansible_user }}/.ssh/authorized_keys"
        block: "{{ public_key }}"

    - name: create sudoers dropin file for 480
      file:
        path: /etc/sudoers.d/480
        state: touch
        mode: 0440
      become: yes

    - name: create a drop in entry in /etc/sudoers.d/480
      blockinfile:
        dest: /etc/sudoers.d/480
        block: "{{ ansible_user }}  ALL=(ALL) NOPASSWD: ALL"
      become: yes

    - name: set the hostname
      hostname:
        name: "{{ hostname }}"
      become: yes

    - name: add host to hosts file
      lineinfile:
        path: /etc/hosts
        line: '127.0.1.1  {{ hostname }}'
      become: yes

    - name: write netplan config
      copy:
        dest: /etc/netplan/00-installer-config.yaml
        mode: 0600
        content: |
          network:
            ethernets:
              {{ device }}:
                addresses:
                  - {{ lan_ip }}/24
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses:
                    - {{ name_server }}
                    - 8.8.8.8
            version: 2
      become: yes

    - name: apply netplan
      command: netplan apply
      become: yes

    - name: bounce the box
      shell: "sleep 5 && shutdown -r now"
      become: yes
      async: 1
      poll: 0